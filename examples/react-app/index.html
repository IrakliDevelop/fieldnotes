<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Field Notes — React Example</title>
    <style>
      body { margin: 0; font-family: system-ui, sans-serif; }
      #root { height: 100vh; }
      .canvas-wrap { width: 100%; height: 100%; position: relative; }
      .toolbar { position: absolute; top: 12px; left: 12px; z-index: 10; display: flex; gap: 4px;
        background: white; padding: 6px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.15); }
      .toolbar button { padding: 6px 10px; border: 1px solid #ddd; background: white;
        border-radius: 4px; cursor: pointer; }
      .toolbar button.active { background: #2196f3; color: white; border-color: #2196f3; }
      .sidebar { position: absolute; right: 12px; top: 12px; bottom: 12px; width: 240px;
        background: white; border: 1px solid #ddd; border-radius: 8px; padding: 12px;
        overflow: auto; z-index: 10; box-shadow: 0 2px 8px rgba(0,0,0,0.15); }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
