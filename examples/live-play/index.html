<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Field Notes — Live Play</title>
    <style>
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        height: 100%;
        font-family: system-ui, sans-serif;
      }
      #app {
        position: fixed;
        inset: 0;
      }
      #host {
        position: absolute;
        inset: 0;
        touch-action: none;
      }
      #cursors {
        position: absolute;
        inset: 0;
        pointer-events: none;
        overflow: hidden;
      }
      .peer-cursor {
        position: absolute;
        top: 0;
        left: 0;
        transform: translate(-9999px, -9999px);
        font-size: 12px;
        padding: 1px 5px;
        border-radius: 6px;
        color: #fff;
        white-space: nowrap;
        background: var(--c, #3b82f6);
      }
      #dm-toolbar {
        position: absolute;
        top: 10px;
        left: 10px;
        display: none;
        gap: 6px;
      }
      #dm-toolbar button,
      #tools button {
        font: inherit;
        padding: 4px 8px;
        border: 1px solid #cbd5e1;
        border-radius: 6px;
        background: #fff;
        cursor: pointer;
      }
      #tools {
        position: absolute;
        top: 10px;
        right: 10px;
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
        justify-content: flex-end;
        max-width: 72vw;
      }
      #tools button.active {
        background: #111;
        color: #fff;
        border-color: #111;
      }
      #tools .sep {
        width: 1px;
        align-self: stretch;
        background: #cbd5e1;
        margin: 2px;
      }
      #join {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #1118;
      }
      #join form {
        background: #fff;
        padding: 20px;
        border-radius: 10px;
        display: grid;
        gap: 10px;
        min-width: 260px;
      }
      #denied {
        color: #c00;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="host"></div>
      <div id="cursors"></div>
      <div id="tools"></div>
      <div id="dm-toolbar">
        <button id="hide">Hide from players</button><button id="reveal">Reveal</button>
      </div>
    </div>
    <div id="join">
      <form id="join-form">
        <strong>Join live play</strong>
        <label>Name (unique) <input name="name" required autocomplete="off" /></label>
        <label><input type="radio" name="role" value="dm" /> DM</label>
        <label><input type="radio" name="role" value="player" checked /> Player</label>
        <label>Room <input name="room" value="table" /></label>
        <button type="submit">Join</button>
        <div id="denied"></div>
      </form>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
