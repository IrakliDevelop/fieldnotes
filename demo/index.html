<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Field Notes — Dev Playground</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 100vw; height: 100vh; overflow: hidden; font-family: system-ui, sans-serif; }
    #canvas { width: 100%; height: 100%; }
    #toolbar {
      position: fixed;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 4px;
      padding: 6px;
      background: white;
      border-radius: 10px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.15);
      z-index: 10;
    }
    #toolbar button {
      padding: 8px 14px;
      border: 1px solid #ddd;
      border-radius: 6px;
      background: white;
      cursor: pointer;
      font-size: 13px;
      font-family: inherit;
      transition: all 0.15s;
    }
    #toolbar button:hover { background: #f0f0f0; }
    #toolbar button.active {
      background: #1a1a1a;
      color: white;
      border-color: #1a1a1a;
    }
    #toolbar button:disabled {
      opacity: 0.35;
      cursor: default;
    }
    #toolbar button:disabled:hover { background: white; }
    #toolbar button .shortcut {
      font-size: 10px;
      opacity: 0.5;
      margin-left: 4px;
    }
    #info {
      position: fixed;
      bottom: 16px;
      left: 16px;
      padding: 8px 12px;
      background: rgba(0,0,0,0.7);
      color: white;
      border-radius: 6px;
      font-size: 13px;
      pointer-events: none;
      z-index: 10;
    }
  </style>
</head>
<body>
  <div id="canvas"></div>
  <div id="toolbar">
    <button data-tool="hand">Hand<span class="shortcut">H</span></button>
    <button data-tool="select" class="active">Select<span class="shortcut">V</span></button>
    <button data-tool="pencil">Pencil<span class="shortcut">P</span></button>
    <button data-tool="eraser">Eraser<span class="shortcut">E</span></button>
    <button data-tool="arrow">Arrow<span class="shortcut">A</span></button>
    <button data-tool="note">Note<span class="shortcut">N</span></button>
    <button id="image-btn">Image<span class="shortcut">I</span></button>
    <button id="embed-btn">Embed</button>
    <div style="width: 1px; background: #ddd; margin: 2px 4px;"></div>
    <input type="color" id="tool-color" value="#1a1a1a" title="Tool color" style="width: 34px; height: 34px; padding: 2px; border: 1px solid #ddd; border-radius: 6px; cursor: pointer; background: white;">
    <div style="width: 1px; background: #ddd; margin: 2px 4px;"></div>
    <button id="undo" disabled>Undo<span class="shortcut">⌘Z</span></button>
    <button id="redo" disabled>Redo<span class="shortcut">⌘⇧Z</span></button>
    <div style="width: 1px; background: #ddd; margin: 2px 4px;"></div>
    <button id="save">Save</button>
    <button id="load">Load</button>
  </div>
  <input type="file" id="image-file" accept="image/*" style="display: none">
  <div id="info"></div>
  <script type="module" src="./main.ts"></script>
</body>
</html>
