<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Field Notes — Dev Playground</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 100vw; height: 100vh; overflow: hidden; font-family: system-ui, sans-serif; }
    #canvas { width: 100%; height: 100%; }
    #toolbar {
      position: fixed;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 4px;
      padding: 6px;
      background: white;
      border-radius: 10px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.15);
      z-index: 10;
    }
    #toolbar button {
      padding: 8px 14px;
      border: 1px solid #ddd;
      border-radius: 6px;
      background: white;
      cursor: pointer;
      font-size: 13px;
      font-family: inherit;
      transition: all 0.15s;
    }
    #toolbar button:hover { background: #f0f0f0; }
    #toolbar button.active {
      background: #1a1a1a;
      color: white;
      border-color: #1a1a1a;
    }
    #toolbar button:disabled {
      opacity: 0.35;
      cursor: default;
    }
    #toolbar button:disabled:hover { background: white; }
    #toolbar button .shortcut {
      font-size: 10px;
      opacity: 0.5;
      margin-left: 4px;
    }
    #info {
      position: fixed;
      bottom: 16px;
      left: 16px;
      padding: 8px 12px;
      background: rgba(0,0,0,0.7);
      color: white;
      border-radius: 6px;
      font-size: 13px;
      pointer-events: none;
      z-index: 10;
    }
    #text-panel {
      display: none;
      position: fixed;
      top: 70px;
      left: 50%;
      transform: translateX(-50%);
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      background: white;
      border-radius: 8px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.15);
      z-index: 10;
      font-size: 13px;
      font-family: inherit;
    }
    #shape-panel {
      display: none;
      position: fixed;
      top: 70px;
      left: 50%;
      transform: translateX(-50%);
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      background: white;
      border-radius: 8px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.15);
      z-index: 10;
      font-size: 13px;
      font-family: inherit;
    }
    #note-panel {
      display: none;
      position: fixed;
      top: 70px;
      left: 50%;
      transform: translateX(-50%);
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      background: white;
      border-radius: 8px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.15);
      z-index: 10;
      font-size: 13px;
      font-family: inherit;
    }
    #shape-panel select, #shape-panel button {
      padding: 4px 8px;
      border: 1px solid #ddd;
      border-radius: 4px;
      background: white;
      cursor: pointer;
      font-size: 13px;
      font-family: inherit;
    }
    #grid-panel select, #grid-panel button {
      padding: 4px 8px;
      border: 1px solid #ddd;
      border-radius: 4px;
      background: white;
      cursor: pointer;
      font-size: 13px;
      font-family: inherit;
    }
    #grid-panel button.active {
      background: #1a1a1a;
      color: white;
      border-color: #1a1a1a;
    }
    #text-panel select, #text-panel button {
      padding: 4px 8px;
      border: 1px solid #ddd;
      border-radius: 4px;
      background: white;
      cursor: pointer;
      font-size: 13px;
      font-family: inherit;
    }
    #text-panel button:hover { background: #f0f0f0; }
    #text-panel button.active {
      background: #1a1a1a;
      color: white;
      border-color: #1a1a1a;
    }
    #layers-panel {
      position: fixed;
      top: 70px;
      right: 16px;
      width: 220px;
      background: white;
      border-radius: 10px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.15);
      z-index: 10;
      font-size: 13px;
      font-family: inherit;
      max-height: calc(100vh - 100px);
      overflow-y: auto;
    }
    #layers-panel .layers-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 12px 6px;
      font-weight: 600;
      color: #666;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    #layers-panel .layers-header button {
      padding: 2px 8px;
      border: 1px solid #ddd;
      border-radius: 4px;
      background: white;
      cursor: pointer;
      font-size: 16px;
      line-height: 1;
    }
    #layers-panel .layers-header button:hover { background: #f0f0f0; }
    #layers-list { list-style: none; padding: 0 6px 6px; margin: 0; }
    #layers-list li {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 8px;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.1s;
    }
    #layers-list li:hover { background: #f5f5f5; }
    #layers-list li.active { background: #e8f0fe; border: 1px solid #4a9eff; }
    #layers-list li .layer-name {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    #layers-list li button {
      background: none;
      border: none;
      cursor: pointer;
      padding: 2px;
      font-size: 14px;
      opacity: 0.5;
      transition: opacity 0.1s;
    }
    #layers-list li button:hover { opacity: 1; }
    #layers-list li button.on { opacity: 1; }
  </style>
</head>
<body>
  <div id="canvas"></div>
  <div id="toolbar">
    <button data-tool="hand">Hand<span class="shortcut">H</span></button>
    <button data-tool="select" class="active">Select<span class="shortcut">V</span></button>
    <button data-tool="pencil">Pencil<span class="shortcut">P</span></button>
    <button data-tool="eraser">Eraser<span class="shortcut">E</span></button>
    <button data-tool="arrow">Arrow<span class="shortcut">A</span></button>
    <button data-tool="note">Note<span class="shortcut">N</span></button>
    <button data-tool="text">Text<span class="shortcut">T</span></button>
    <button data-tool="shape">Shape<span class="shortcut">S</span></button>
    <button id="image-btn">Image<span class="shortcut">I</span></button>
    <button id="embed-btn">Embed</button>
    <div style="width: 1px; background: #ddd; margin: 2px 4px;"></div>
    <input type="color" id="tool-color" value="#1a1a1a" title="Tool color" style="width: 34px; height: 34px; padding: 2px; border: 1px solid #ddd; border-radius: 6px; cursor: pointer; background: white;">
    <div style="display: flex; align-items: center; gap: 6px;">
      <span id="brush-preview" style="display:inline-block;width:8px;height:8px;border-radius:50%;background:#1a1a1a;flex-shrink:0;"></span>
      <input type="range" id="brush-size" min="1" max="20" value="2" title="Brush size" style="width: 80px; cursor: pointer;">
      <span id="brush-label" style="font-size: 11px; color: #999; min-width: 20px;">2px</span>
    </div>
    <div style="width: 1px; background: #ddd; margin: 2px 4px;"></div>
    <button id="undo" disabled>Undo<span class="shortcut">⌘Z</span></button>
    <button id="redo" disabled>Redo<span class="shortcut">⌘⇧Z</span></button>
    <div style="width: 1px; background: #ddd; margin: 2px 4px;"></div>
    <button id="snap-toggle">Snap: Off<span class="shortcut">G</span></button>
    <button id="save">Save</button>
    <button id="load">Load</button>
    <button id="export-png">Export PNG</button>
    <label style="display:flex;align-items:center;gap:4px;font-size:12px;color:#666;"><input type="checkbox" id="export-padding"> Padding</label>
  </div>
  <div id="text-panel">
    <span style="color: #999; font-size: 11px;">Text:</span>
    <input type="color" id="text-color" value="#1a1a1a" title="Text color" style="width: 28px; height: 28px; padding: 2px; border: 1px solid #ddd; border-radius: 4px; cursor: pointer; background: white;">
    <select id="font-size">
      <option value="12">12px</option>
      <option value="14">14px</option>
      <option value="16" selected>16px</option>
      <option value="20">20px</option>
      <option value="24">24px</option>
      <option value="32">32px</option>
      <option value="48">48px</option>
    </select>
    <button data-align="left" class="active">Left</button>
    <button data-align="center">Center</button>
    <button data-align="right">Right</button>
  </div>
  <div id="note-panel">
    <span style="color: #999; font-size: 11px;">Note:</span>
    <span style="color: #999; font-size: 11px;">Bg:</span>
    <input type="color" id="note-bg" value="#ffeb3b" title="Note background" style="width: 28px; height: 28px; padding: 2px; border: 1px solid #ddd; border-radius: 4px; cursor: pointer; background: white;">
    <span style="color: #999; font-size: 11px;">Text:</span>
    <input type="color" id="note-text-color" value="#000000" title="Note text color" style="width: 28px; height: 28px; padding: 2px; border: 1px solid #ddd; border-radius: 4px; cursor: pointer; background: white;">
  </div>
  <div id="shape-panel">
    <span style="color: #999; font-size: 11px;">Shape:</span>
    <select id="shape-kind">
      <option value="rectangle" selected>Rectangle</option>
      <option value="ellipse">Ellipse</option>
    </select>
    <span style="color: #999; font-size: 11px;">Fill:</span>
    <input type="color" id="shape-fill" value="#ffffff" title="Fill color" style="width: 28px; height: 28px; padding: 2px; border: 1px solid #ddd; border-radius: 4px; cursor: pointer; background: white;">
    <button id="shape-no-fill">No Fill</button>
  </div>
  <div id="grid-panel" style="position:fixed;top:70px;left:50%;transform:translateX(-50%);background:white;border:1px solid #ddd;border-radius:8px;padding:8px 12px;display:flex;gap:8px;align-items:center;font-size:13px;box-shadow:0 2px 8px rgba(0,0,0,0.08);z-index:10;">
    <button id="grid-toggle" title="Add/remove grid">Grid: Off</button>
    <select id="grid-type" style="padding:4px 8px;border:1px solid #ddd;border-radius:4px;font-size:13px;">
      <option value="square">Square</option>
      <option value="hex" selected>Hex</option>
    </select>
    <select id="hex-orientation" style="padding:4px 8px;border:1px solid #ddd;border-radius:4px;font-size:13px;">
      <option value="pointy" selected>Pointy</option>
      <option value="flat">Flat</option>
    </select>
    <label style="display:flex;align-items:center;gap:4px;">
      Size: <input type="range" id="grid-cell-size" min="20" max="100" value="40" style="width:80px;">
      <span id="grid-cell-size-label">40</span>
    </label>
    <input type="color" id="grid-color" value="#000000" title="Grid color" style="width:28px;height:28px;padding:2px;border:1px solid #ddd;border-radius:4px;cursor:pointer;">
  </div>
  <input type="file" id="image-file" accept="image/*" style="display: none">
  <div id="layers-panel">
    <div class="layers-header">
      Layers
      <button id="add-layer" title="Add layer">+</button>
    </div>
    <ul id="layers-list"></ul>
  </div>
  <div id="info"></div>
  <script type="module" src="./main.ts"></script>
</body>
</html>
